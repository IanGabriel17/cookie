{% extends "base.html" %}
{% block page_title %}Delete Item{% endblock %}
{% block content %}
<section class="panel-card narrow-card">
    <h3 class="section-title">Delete {{ object }}</h3>
    <p class="text-muted">This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger">Delete</button>
        <a href="javascript:history.back()" class="btn btn-outline-secondary">Cancel</a>
    </form>
</section>
{% endblock %}
